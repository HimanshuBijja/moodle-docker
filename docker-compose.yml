services:
  db:
    image: mariadb:10.11.6
    container_name: moodle-db-8092
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodleuser
      MYSQL_PASSWORD: moodlepass
    ports:
      - "3392:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: moodle-redis-8092
    restart: always

  moodle:
    image: moodlehq/moodle-php-apache:8.1
    container_name: moodle-web-8092
    depends_on:
      - db
      - redis
    restart: always
    ports:
      - "100.71.234.30:8092:80"
    volumes:
      - ./moodle:/var/www/html
      - moodledata:/var/www/moodledata

  moodle-cron:
    image: moodlehq/moodle-php-apache:8.1
    container_name: moodle-cron-8092
    depends_on:
      - moodle
    restart: always
    volumes:
      - ./moodle:/var/www/html
      - moodledata:/var/www/moodledata
    entrypoint: >
      sh -c "while true; do
      php /var/www/html/admin/cli/cron.php >/dev/null;
      sleep 60;
      done"

volumes:
  db_data:
  moodledata:
